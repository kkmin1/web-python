<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Converter Launcher</title>
  <style>
    :root {
      --bg: #f4f1e8;
      --panel: #fffef8;
      --line: #d5d0c2;
      --text: #1a2522;
      --muted: #4d605a;
      --accent: #0f766e;
      --accent-dark: #0c5f59;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 0% 0%, #dcefe8 0%, var(--bg) 52%);
      min-height: 100vh;
      padding: 20px;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
    }
    h1 { margin: 0 0 6px; font-size: 1.4rem; }
    p { margin-top: 0; color: var(--muted); }
    .grid { display: grid; gap: 12px; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr auto; align-items: end; }
    label { font-size: 0.94rem; font-weight: 700; }
    input, select, textarea {
      width: 100%;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 10px;
      font-size: 0.94rem;
      background: #fff;
      color: var(--text);
    }
    textarea { min-height: 220px; resize: vertical; font-family: Consolas, monospace; }
    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      min-width: 120px;
    }
    button:hover { background: var(--accent-dark); }
    .actions { display: flex; gap: 10px; }
    .status { font-weight: 700; }
    .ok { color: var(--accent-dark); }
    .err { color: var(--danger); }
    @media (max-width: 760px) {
      .row { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Python 변환 실행기 (Electron)</h1>
    <p>스크립트와 타겟 파일을 선택하고 실행하면, 로컬에서 바로 Python이 동작합니다.</p>

    <section class="grid">
      <label>
        스크립트 목록 (프로젝트 내 .py)
        <select id="scriptSelect"></select>
      </label>

      <div class="row">
        <label>
          또는 스크립트 파일 직접 선택
          <input id="scriptPath" type="text" />
        </label>
        <button id="pickScriptBtn" type="button">스크립트 선택</button>
      </div>

      <div class="row">
        <label>
          입력 파일
          <input id="inputPath" type="text" />
        </label>
        <button id="pickInputBtn" type="button">입력 파일 선택</button>
      </div>

      <div class="row" style="grid-template-columns: 1fr auto 220px;">
        <label>
          출력 파일 (선택)
          <input id="outputPath" type="text" />
        </label>
        <button id="pickOutputBtn" type="button">출력 파일 선택</button>
        <label>
          출력 인자 방식
          <select id="outputMode">
            <option value="none">사용 안 함</option>
            <option value="positional">positional</option>
            <option value="dash_o">-o / --output</option>
          </select>
        </label>
      </div>

      <label>
        추가 인자 (선택)
        <input id="extraArgs" type="text" placeholder="예: --assets-dir f_assets" />
      </label>

      <div class="actions">
        <button id="runBtn" type="button">실행</button>
      </div>

      <div id="status" class="status"></div>

      <label>
        실행 로그
        <textarea id="log" readonly></textarea>
      </label>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
